services:
  db:
    image: postgres:16
    container_name: dorm-made-db
    environment:
      POSTGRES_DB: ${DB_NAME:-dorm-made}
      POSTGRES_USER: ${DB_USER:-dorm-made}
      # Set DB_PASSWORD in your .env file - never commit real passwords
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in backend/.env}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
